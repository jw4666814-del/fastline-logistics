<section class="tracking-section" id="track">
    <div class="container">
        <div class="tracking-widget">

            <h3>Track Your Shipment</h3>
            <p>Enter your tracking number to see live status.</p>

            <div class="tracking-input-group">
                <input type="text" id="trackingNumber" placeholder="Enter tracking number (e.g., FLT123456789)">
                <button class="btn btn-primary" onclick="trackShipment()">Track</button>
            </div>

            <!-- RESULT AREA -->
            <div id="trackingResult" style="display:none; margin-top:20px;">
                <h4>Status: <span style="color:green;">In Transit</span></h4>
                <p>Estimated Delivery: 2-3 Days</p>

                <!-- MAP (HIDDEN INITIALLY) -->
                <div id="liveMap" style="height:300px; margin-top:15px;"></div>
            </div>

        </div>
    </div>
</section>
