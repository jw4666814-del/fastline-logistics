<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_KEY"></script>

<script>
// 🔐 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC89RwQp0vXTSvyzCtChIZnjsPNZjLtNfk",
  authDomain: "fastline-logistics.firebaseapp.com",
  databaseURL: "https://fastline-logistics-default-rtdb.firebaseio.com/",
  projectId: "fastline-logistics"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// MAP VARIABLES
let map, marker, routeLine;
let driverIndex = 0;
let driverRoute = [];

// 🚚 TRACK FROM FIREBASE
function trackShipment() {
    const input = document.getElementById('trackingInput');
    const trackingNum = input.value.trim().toUpperCase();

    if (!trackingNum) {
        alert('Enter tracking number');
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('trackingResult').style.display = 'none';

    db.ref("shipments/" + trackingNum).once("value").then(snapshot => {

        document.getElementById('loading').style.display = 'none';

        if (!snapshot.exists()) {
            alert("Tracking number not found");
            return;
        }

        const data = snapshot.val();
        displayTracking(data, trackingNum);
    });
}

// 🎯 DISPLAY DATA
function displayTracking(data, trackingNum) {

    document.getElementById('statusTitle').textContent = data.status;
    document.getElementById('statusDesc').textContent = "Live shipment update";
    document.getElementById('displayTrackingNumber').textContent = trackingNum;

    document.getElementById('shipmentStatus').textContent = data.status;

    document.getElementById('trackingResult').style.display = 'block';

    setTimeout(() => {
        initGoogleMap(data.route);
    }, 200);

    document.getElementById('trackingResult').scrollIntoView({ behavior: 'smooth' });
}

// 🗺️ GOOGLE MAP + DRIVER SIMULATION
function initGoogleMap(routeData) {

    const center = routeData[0];

    map = new google.maps.Map(document.getElementById("liveMap"), {
        zoom: 6,
        center: center
    });

    driverRoute = routeData;

    marker = new google.maps.Marker({
        position: routeData[0],
        map: map,
        icon: "https://maps.google.com/mapfiles/kml/shapes/truck.png"
    });

    routeLine = new google.maps.Polyline({
        path: routeData,
        geodesic: true,
        strokeOpacity: 0.8,
        strokeWeight: 4,
        map: map
    });

    driverIndex = 0;
    animateDriver();
}

// 🚚 DRIVER MOVEMENT
function animateDriver() {
    if (driverIndex < driverRoute.length) {
        marker.setPosition(driverRoute[driverIndex]);
        map.panTo(driverRoute[driverIndex]);
        driverIndex++;

        setTimeout(animateDriver, 2000);
    }
}

// ⌨️ ENTER KEY SUPPORT
document.getElementById('trackingInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') trackShipment();
});
</script>
