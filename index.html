<!-- FIX 3: HIDE MAP INITIALLY -->
<div id="liveMap" style="display:none;"></div>


<!-- FIX 4: SCRIPT UPDATE -->
<script>
let mapInitialized = false;

function initLiveMap() {
    const map = L.map('liveMap').setView([39.8283, -98.5795], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        attribution: '© OpenStreetMap' 
    }).addTo(map);

    const hubs = [
        { name: "Houston HQ", coords: [29.7604, -95.3698] },
        { name: "New York Hub", coords: [40.6413, -73.7781] },
        { name: "Los Angeles Hub", coords: [33.9416, -118.4085] },
        { name: "Arizona Hub", coords: [33.4255, -111.9400] },
        { name: "Toronto Hub", coords: [43.6777, -79.6248] }
    ];

    hubs.forEach(hub => {
        L.marker(hub.coords).addTo(map)
        .bindPopup(`<b>${hub.name}</b>`);
    });
}

function trackShipment() {
    const trackingNum = document.getElementById('trackingNumber').value.trim();

    if (!trackingNum) {
        alert('Please enter a tracking number');
        return;
    }

    // SHOW MAP ONLY WHEN TRACKING
    const mapDiv = document.getElementById('liveMap');
    mapDiv.style.display = 'block';

    if (!mapInitialized) {
        initLiveMap();
        mapInitialized = true;
    }

    // KEEP YOUR ORIGINAL REDIRECT
    window.location.href = `track.html?tracking=${encodeURIComponent(trackingNum)}`;
}
</script>
