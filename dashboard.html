<!DOCTYPE html>
<html>
<head>
  <title>Fastline Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h2>📦 Fastline Admin Dashboard</h2>

<input id="tracking" placeholder="FL123456"><br><br>
<input id="status" placeholder="Status (In Transit...)"><br><br>

<button onclick="save()">Save Shipment</button>

<hr>

<h3>All Shipments</h3>
<ul id="list"></ul>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC89RwQp0vXTSvyzCtChIZnjsPNZjLtNfk",
  authDomain: "fastline-logistics.firebaseapp.com",
  projectId: "fastline-logistics",

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function save(){
  const tracking = document.getElementById("tracking").value;
  const status = document.getElementById("status").value;

  db.collection("shipments").doc(tracking).set({
    status: status,
    sender: "Fastline Logistics",
    receiver: "Customer",
    date: new Date().toLocaleString()
  });

  alert("Shipment saved!");
}

// Load shipments
db.collection("shipments").onSnapshot(snapshot => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const li = document.createElement("li");
    li.textContent = doc.id + " - " + doc.data().status;
    list.appendChild(li);
  });
});
</script>

</body>
</html>}
</script>

</body>
</html>
