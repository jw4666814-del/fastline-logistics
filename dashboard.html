<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h2>Fastline Admin Dashboard</h2>

<input id="tracking" placeholder="Tracking Number"><br><br>
<input id="status" placeholder="Status"><br><br>

<button onclick="save()">Save Shipment</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function save(){
    const tracking = document.getElementById('tracking').value;
    const status = document.getElementById('status').value;

    db.collection("shipments").doc(tracking).set({
        status: status
    });

    alert("Saved!");
}
</script>

</body>
</html>
