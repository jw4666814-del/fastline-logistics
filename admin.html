<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
.box { background:#222; padding:20px; margin:50px auto; width:400px; border-radius:10px; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; background:#f97316; border:none; color:white; }
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="box" id="adminBox" style="display:none;">
<h2>Add Shipment</h2>

<input id="trackId" placeholder="Tracking ID"><br>
<input id="status" placeholder="Status"><br>
<textarea id="route" placeholder='Route JSON'></textarea><br>

<button onclick="add()">Save Shipment</button>
<button onclick="logout()">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC89RwQp0vXTSvyzCtChIZnjsPNZjLtNfk",
  authDomain: "fastline-logistics.firebaseapp.com",
  databaseURL: "fastline-logistics.firebasestorage.app",
  projectId: "fastline-logistics"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function login(){
 let email=document.getElementById("email").value;
 let pass=document.getElementById("pass").value;

 firebase.auth().signInWithEmailAndPassword(email,pass)
 .then(()=>{
   document.getElementById("loginBox").style.display="none";
   document.getElementById("adminBox").style.display="block";
 });
}

function logout(){
 firebase.auth().signOut();
 location.reload();
}

function add(){
 let id=document.getElementById("trackId").value;

 let data={
   status:document.getElementById("status").value,
   route:JSON.parse(document.getElementById("route").value)
 };

 db.ref("shipments/"+id).set(data);
 alert("Saved!");
}
</script>

</body>
</html>
