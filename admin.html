<!-- Firebase SDK (MODERN VERSION) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 YOUR CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyC89RwQp0vXTSvyzCtChIZnjsPNZjLtNfk",
    authDomain: "fastline-logistics.firebaseapp.com",
    projectId: "fastline-logistics",
    storageBucket: "fastline-logistics.firebasestorage.app",
    messagingSenderId: "690436395427",
    appId: "1:690436395427:web:c0bde1ab8302d5e74e4a16",
    measurementId: "G-FQB93GK2T5"
  };

  // INIT
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // LOGIN FUNCTION
  window.loginAdmin = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Login successful 🚀");
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
      })
      .catch(error => {
        alert(error.message);
      });
  };

  // LOGOUT
  window.logoutAdmin = function () {
    signOut(auth).then(() => {
      location.reload();
    });
  };

  // CHECK LOGIN STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    }
  });

  // ADD SHIPMENT
  window.addShipment = async function () {
    const tracking = "FL-" + Math.floor(Math.random() * 1000000000);

    await addDoc(collection(db, "shipments"), {
      tracking,
      status: "In Transit",
      createdAt: new Date()
    });

    alert("Shipment Created: " + tracking);
    loadShipments();
  };

  // LOAD SHIPMENTS
  async function loadShipments() {
    const querySnapshot = await getDocs(collection(db, "shipments"));
    const list = document.getElementById("shipmentList");
    list.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      list.innerHTML += `
        <div style="padding:10px;border-bottom:1px solid #ccc">
          📦 ${data.tracking} - ${data.status}
        </div>
      `;
    });
  }

  window.onload = loadShipments;
</script>
